<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <!-- Tailwind+CSS -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


     <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- custom css -->
    <link rel="stylesheet" href="/style/style.css">

</head>
<body>
    <header class="mt-20 p-10 mx-auto max-w-md bg-white rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-gray-100 "  >
    <div class="flex flex-col items-center justify-center mt-20 mb-10 gap-5">

    <img src="/assets/github-logo.png" alt="github logo" >
    <div>
    <h2 class="text-3xl font-bold ml-4 text-black text-center">GitHub Issues Tracker</h2>
    <p class="text-lg ml-4 text-gray-400 text-center">Sign in to manage your issues</p>
    </div>
    </div>
  
     <div class ="mx-auto w-full  flex items-center justify-center">
        
  <form id="loginForm" class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
  <fieldset class="fieldset">
    <label class="label">Use name</label>
    <input type="text" id="username" class="input validator" placeholder="Username" required />
  </fieldset>

  <label class="fieldset">
    <span class="label">Password</span>
    <input type="password" id="password" class="input validator" placeholder="Password" required />
  </label>

  <button class="btn btn-primary mt-4" type="submit">Login</button>
</form>
</div>
</header>
<script src="/script/script.js"></script>
</body>
</html>
